# Configuración de build para Railway (Nixpacks)
# Instala Chromium del sistema para que Puppeteer/whatsapp-web.js funcione.

[phases.setup]
nixPkgs = ["nodejs_20", "chromium"]

[variables]
# Le dice a Puppeteer que NO descargue su propio Chromium y use el del sistema
PUPPETEER_SKIP_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/nix/var/nix/profiles/default/bin/chromium"
